name: Publish NuGet Packages

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          10.0.x

    - name: Extract version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Pack Abdul.Brevo.Conversations
      run: dotnet pack src/Abdul.Brevo.Conversations/Abdul.Brevo.Conversations.csproj --configuration Release -p:Version=${{ steps.version.outputs.VERSION }} -o ./artifacts

    - name: Pack Abdul.Brevo.Email
      run: dotnet pack src/Abdul.Brevo.Email/Abdul.Brevo.Email.csproj --configuration Release -p:Version=${{ steps.version.outputs.VERSION }} -o ./artifacts

    - name: Pack Abdul.Brevo.Crm
      run: dotnet pack src/Abdul.Brevo.Crm/Abdul.Brevo.Crm.csproj --configuration Release -p:Version=${{ steps.version.outputs.VERSION }} -o ./artifacts
      
    - name: Push to NuGet
      run: dotnet nuget push ./artifacts/*.nupkg -k ${{ secrets.NUGET_API_KEY }} -s https://api.nuget.org/v3/index.json
