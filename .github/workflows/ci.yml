name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          10.0.x
          
    - name: Restore dependencies
      run: dotnet restore Abdul.Brevo.slnx
      
    - name: Build
      run: dotnet build Abdul.Brevo.slnx --no-restore --configuration Release
      
    - name: Test
      run: dotnet test Abdul.Brevo.slnx --no-build --configuration Release --verbosity normal
